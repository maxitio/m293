  <rect width="400" height="300" fill="url(#bgepitalon)"/>
  <rect width="400" height="300" fill="url(#spotepitalon)"/>
  <line x1="322.0" y1="56.0" x2="348.0" y2="71.0" stroke="#2b8ad6" stroke-width="1.6" opacity="0.5"/><line x1="348.0" y1="71.0" x2="348.0" y2="101.0" stroke="#2b8ad6" stroke-width="1.6" opacity="0.5"/><line x1="348.0" y1="101.0" x2="322.0" y2="116.0" stroke="#2b8ad6" stroke-width="1.6" opacity="0.5"/><line x1="322.0" y1="116.0" x2="296.0" y2="101.0" stroke="#2b8ad6" stroke-width="1.6" opacity="0.5"/><line x1="296.0" y1="101.0" x2="296.0" y2="71.0" stroke="#2b8ad6" stroke-width="1.6" opacity="0.5"/><line x1="296.0" y1="71.0" x2="322.0" y2="56.0" stroke="#2b8ad6" stroke-width="1.6" opacity="0.5"/><circle cx="322.0" cy="56.0" r="3.4" fill="#2b8ad6" opacity="0.7"/><circle cx="348.0" cy="71.0" r="3.4" fill="#2b8ad6" opacity="0.7"/><circle cx="348.0" cy="101.0" r="3.4" fill="#2b8ad6" opacity="0.7"/><circle cx="322.0" cy="116.0" r="3.4" fill="#2b8ad6" opacity="0.7"/><circle cx="296.0" cy="101.0" r="3.4" fill="#2b8ad6" opacity="0.7"/><circle cx="296.0" cy="71.0" r="3.4" fill="#2b8ad6" opacity="0.7"/><line x1="348.0" y1="71.0" x2="372.0" y2="59.0" stroke="#2b8ad6" stroke-width="1.6" opacity="0.4"/><circle cx="372.0" cy="59.0" r="3" fill="#2b8ad6" opacity="0.5"/>
