<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" role="img" aria-label="Epitalon – 10 mg Vial">
  <defs>
    <linearGradient id="bgepitalon" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fdfefe"/><stop offset="0.6" stop-color="#f3f7fa"/><stop offset="1" stop-color="#2b8ad6" stop-opacity="0.10"/>
    </linearGradient>
    <radialGradient id="spotepitalon" cx="50%" cy="34%" r="60%">
      <stop offset="0" stop-color="#ffffff"/><stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="glassepitalon" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.95"/><stop offset="0.5" stop-color="#eef3f7"/><stop offset="1" stop-color="#cdd8e2"/>
