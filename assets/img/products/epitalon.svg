    <rect x="16" y="0" width="32" height="9" rx="2" fill="#32a2fc"/>
    <rect x="12" y="8" width="40" height="16" rx="3" fill="url(#capepitalon)"/>
    <rect x="16" y="11" width="6" height="10" rx="2" fill="#ffffff" opacity="0.35"/>
